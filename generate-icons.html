<!DOCTYPE html>
<html>
<head>
    <title>Kataleya Icon Generator</title>
    <style>
        body { font-family: system-ui; padding: 20px; background: #1a1a2e; color: white; }
        canvas { border: 2px solid #87a878; margin: 10px; border-radius: 20%; }
        .download-btn { 
            background: #87a878; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>Kataleya Icon Generator</h2>
    <p>Right-click each icon to save:</p>
    <div id="icons"></div>

    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        const container = document.getElementById('icons');
        
        sizes.forEach(size => {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Center circle (sage color)
            ctx.beginPath();
            ctx.arc(size/2, size/2, size*0.35, 0, Math.PI * 2);
            ctx.fillStyle = '#87a878';
            ctx.fill();
            
            // Inner circle (terra accent)
            ctx.beginPath();
            ctx.arc(size/2, size/2, size*0.25, 0, Math.PI * 2);
            ctx.fillStyle = '#d4a373';
            ctx.fill();
            
            // Center dot
            ctx.beginPath();
            ctx.arc(size/2, size/2, size*0.1, 0, Math.PI * 2);
            ctx.fillStyle = '#f5f5f5';
            ctx.fill();
            
            // Label
            const label = document.createElement('div');
            label.textContent = `${size}x${size}`;
            label.style.marginBottom = '20px';
            
            // Download link
            const link = document.createElement('a');
            link.className = 'download-btn';
            link.textContent = 'Download';
            link.download = `icon-${size}x${size}.png`;
            link.href = canvas.toDataURL();
            
            const wrapper = document.createElement('div');
            wrapper.style.display = 'inline-block';
            wrapper.style.textAlign = 'center';
            wrapper.style.margin = '10px';
            wrapper.appendChild(canvas);
            wrapper.appendChild(document.createElement('br'));
            wrapper.appendChild(label);
            wrapper.appendChild(link);
            
            container.appendChild(wrapper);
        });
    </script>
</body>
</html>
